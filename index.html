<!DOCTYPE html>

<html>

<head>

  <title>MetaBows</title>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Space+Grotesk:wght@300;400;600&display=swap" rel="stylesheet">

  <style>

    body {

      margin: 0;

      background: black;

      color: white;

      font-family: 'Space Grotesk', sans-serif;

      text-align: center;

    }

    .hero {

      height: 100vh;

      position: relative;

      overflow: hidden;

    }

    video {

      position: absolute;

      width: 100%;

      height: 100%;

      object-fit: cover;

    }

    .overlay {

      position: absolute;

      width: 100%;

      height: 100%;

      background: linear-gradient(to bottom, rgba(0,0,0,0.5), black);

      display: flex;

      justify-content: center;

      align-items: center;

      flex-direction: column;

    }

    .title {

      font-family: Orbitron;

      font-size: 80px;

      background: linear-gradient(90deg, #00fff2, #ff00c8);

      -webkit-background-clip: text;

      -webkit-text-fill-color: transparent;

    }

    .main {

      padding: 60px 20px;

      max-width: 1000px;

      margin: auto;

    }

    .cta {

      margin-top: 40px;

      padding: 12px 30px;

      border: 1px solid white;

      background: transparent;

      color: white;

      cursor: pointer;

    }

    #quiz {

      display: none;

      margin-top: 30px;

    }

    select {

      padding: 10px;

      margin: 10px;

      background: black;

      color: white;

      border: 1px solid white;

    }

    .grid {

      display: grid;

      grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));

      gap: 8px;

      margin-top: 40px;

    }

    .grid img {

      width: 100%;

      transition: 0.2s;

    }

    .grid img:hover {

      transform: scale(1.05);

    }

  </style>

</head>

<body>

<div class="hero">

  <video autoplay muted loop playsinline>

    <source src="bg.mp4" type="video/mp4">

  </video>

  <div class="overlay">

    <div class="title">METABOWS</div>

  </div>

</div>

<div class="main">

<p>

Meta-Bows is a collection of 2222 unique digital identities—each one a wearable expression of who you are or who you choose to become.

</p>

<button onclick="startQuiz()" class="cta">FIND YOUR IDENTITY</button>

<div id="quiz">

<p>Choose your vibe:</p>

<select id="vibe">

  <option>Chill</option>

  <option>Loud</option>

  <option>Clean</option>

  <option>Weird</option>

</select>

<p>Choose your energy:</p>

<select id="energy">

  <option>Smooth</option>

  <option>Hype</option>

  <option>Dreamy</option>

  <option>Wild</option>

</select>

<br>

<button onclick="showNFTs()" class="cta">Reveal</button>

</div>

<div id="result" class="grid"></div>

</div>

<script>

const CID = "QmcZCK1QCt677ogSN28kChaJ4dt1jPQJvejbL1MrcRTXz6";

function startQuiz() {

  document.getElementById("quiz").style.display = "block";

}

function getRange(vibe, energy) {

  let vibes = ["Chill","Loud","Clean","Weird"];

  let energies = ["Smooth","Hype","Dreamy","Wild"];

  let vibeIndex = vibes.indexOf(vibe);

  let energyIndex = energies.indexOf(energy);

  let comboIndex = vibeIndex * 4 + energyIndex;

  let rangeSize = Math.floor(2222 / 16);

  let start = comboIndex * rangeSize;

  let end = start + rangeSize;

  return {start, end};

}

function showNFTs() {

  let vibe = document.getElementById("vibe").value;

  let energy = document.getElementById("energy").value;

  let {start, end} = getRange(vibe, energy);

  let container = document.getElementById("result");

  container.innerHTML = "";

  let count = 130;

  for (let i = 0; i < count; i++) {

    let id = Math.floor(Math.random() * (end - start)) + start;

    let img = document.createElement("img");

    img.src = `https://ipfs.io/ipfs/${CID}/${id}.png`;

    container.appendChild(img);

  }

}

</script>

</body>

</html>
